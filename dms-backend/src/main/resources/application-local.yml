spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/dms_db?useUnicode=true&characterEncoding=UTF-8
    username: root
    password: '1111'
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

cors:
  allowed-origins: "http://localhost:*,http://127.0.0.1:*"

storage:
  type: local
  local:
    upload-dir: uploads

logging:
  level:
    com.dms: DEBUG
    org.hibernate.SQL: DEBUG
