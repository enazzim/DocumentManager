spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/dms_db?useUnicode=true&characterEncoding=UTF-8
    username: root
    password: '1111'
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

logging:
  level:
    com.dms: DEBUG
    org.hibernate.SQL: DEBUG
